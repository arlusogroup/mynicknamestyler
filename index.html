<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nickname Styler — Splash</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #ffffff;
      --black: #0a0a0a;
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --mid: #f4f4f5;
      --muted: #a1a1aa;
      --radius: 28px;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ---- Layout ---- */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- LOGO ---- */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo-mark {
      width: 96px;
      height: 96px;
      position: relative;
    }

    /* SVG logo paths animated in */
    .logo-mark svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* The outer ring */
    .ring-outer {
      fill: none;
      stroke: var(--black);
      stroke-width: 3.5;
      stroke-dasharray: 301;
      stroke-dashoffset: 301;
      animation: drawRing 0.7s cubic-bezier(0.6, 0, 0.4, 1) 0.4s forwards;
    }

    @keyframes drawRing {
      to { stroke-dashoffset: 0; }
    }

    /* letter N paths */
    .n-path {
      fill: none;
      stroke: var(--black);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: drawN 0.5s cubic-bezier(0.6, 0, 0.3, 1) 0.8s forwards;
    }

    .spark-dot {
      fill: var(--accent);
      r: 0;
      animation: popDot 0.3s ease 1.15s forwards;
    }

    @keyframes drawN {
      to { stroke-dashoffset: 0; }
    }

    @keyframes popDot {
      to { r: 5; }
    }

    /* wordmark */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .wordmark-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 32px;
      letter-spacing: -1px;
      color: var(--black);
      line-height: 1;
    }

    .wordmark-title span {
      color: var(--accent);
    }

    .wordmark-sub {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ---- VERSION ---- */
    .version-tag {
      position: fixed;
      top: 32px;
      right: 32px;
      font-size: 11px;
      font-weight: 500;
      color: #d4d4d8;
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.4s forwards;
    }

    /* exit animation */
    .scene.exit {
      animation: fadeOut 0.25s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.97); }
    }
  </style>
</head>
<body>

  <span class="version-tag">v2.0</span>

  <div class="scene" id="scene">

    <div class="logo-wrap">

      <!-- SVG Logo Mark -->
      <div class="logo-mark">
        <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer circle -->
          <circle class="ring-outer" cx="48" cy="48" r="44" stroke-linecap="round"/>

          <!-- Stylised N letterform inside -->
          <polyline class="n-path" points="30,64 30,32 54,64 54,32" stroke-dasharray="160" stroke-dashoffset="160"/>
          <line class="n-path" x1="54" y1="32" x2="66" y2="32" stroke-dasharray="20" stroke-dashoffset="20"/>

          <!-- accent dot -->
          <circle class="spark-dot" cx="66" cy="47" r="0"/>
        </svg>
      </div>

      <!-- Wordmark -->
      <div class="wordmark">
        <div class="wordmark-title">Nickname<span>Styler</span></div>
        <div class="wordmark-sub">Premium Studio</div>
      </div>

    </div>

  </div>

  <script>
    (function () {
      const scene = document.getElementById('scene');

      function redirect() {
        scene.classList.add('exit');
        // CLEAN URL: no .html, just the folder path
        setTimeout(() => { window.location.href = '/nickname-styler/'; }, 250);
      }

      // Redirect after 2.5 seconds
      setTimeout(redirect, 2500);
    })();
  </script>
</body>
</html>
